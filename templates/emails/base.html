<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ subject }}</title>
  <style>
    body { margin: 0; padding: 0; background-color: #f4f2f0; font-family: Georgia, 'Times New Roman', serif; }
    .container { max-width: 600px; margin: 0 auto; background: #ffffff; }
    .header { background: #1b140d; padding: 32px 24px; text-align: center; }
    .header h1 { color: #f3ede7; font-size: 22px; margin: 0; letter-spacing: 1px; }
    .content { padding: 32px 28px; color: #333333; font-size: 15px; line-height: 1.7; }
    .content p { margin: 0 0 16px; }
    .signature { margin-top: 28px; padding-top: 20px; border-top: 1px solid #e6e0db; }
    .signature p { margin: 0 0 4px; color: #666; font-size: 14px; }
    .btn { display: inline-block; padding: 12px 28px; background: #9a6c4c; color: #ffffff; text-decoration: none; border-radius: 6px; font-weight: 600; margin: 12px 0; }
    .footer { background: #f7f5f4; padding: 20px 28px; text-align: center; font-size: 12px; color: #999; }
  </style>
</head>
<body>
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0">
    <tr>
      <td align="center" style="padding: 24px 0;">
        <table role="presentation" class="container" width="600" cellspacing="0" cellpadding="0">
          <tr>
            <td class="header">
              <h1>URBANA</h1>
            </td>
          </tr>
          <tr>
            <td class="content">
              {% block content %}{% endblock %}
              <div class="signature">
                {% block signature %}{% endblock %}
              </div>
            </td>
          </tr>
          <tr>
            <td class="footer">
              Urbana Africa &mdash; Where African fashion meets the world.<br>
              <a href="https://www.urbanaafrica.com" style="color:#9a6c4c;">www.urbanaafrica.com</a>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
