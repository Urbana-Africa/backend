{% extends "emails/base.html" %}

{% block content %}
<!-- Hero Section -->
<table role="presentation" width="100%" border="0" cellpadding="0" cellspacing="0" style="margin-bottom: 32px;">
  <tr>
    <td align="center">
      <div style="background-color: #1b1c1a; padding: 40px 24px; border-radius: 12px; margin-bottom: 24px;">
        <h1 style="color: #ffffff; font-size: 36px; font-weight: 800; line-height: 1.1; margin-bottom: 24px; text-transform: uppercase;">{{ subject|default:"The Modern Griot" }}</h1>
        <img src="https://lh3.googleusercontent.com/aida-public/AB6AXuAUm_8oWIpKWqmfQS9p1Mbmeq-PrlTULHuhGUZFgCxnt2ipyrueQo4qvbPMCwUEGwprolwSJ9cLw-kgInER_cfci54k4DY3E-QQD9HQwiBWxo3mVFpqMXuCahR1tjWvwMLwEq8fNH-jlJSst39AhHPIXSxLwQpTYcIZ01wqHbjC9MXATOxsTBhXGvjPMmWBrWDwyyMBjISCSvj6ROXCSxye37E9dk9ap-s9m1wgF4coxfLkIOq5-Zqu" alt="African Couture" width="100%" style="border-radius: 8px; max-width: 100%;">
      </div>
    </td>
  </tr>
</table>

<!-- Dynamic Content Injection -->
<div style="margin-bottom: 32px;">
  {{ content|safe }}
</div>

<!-- CTA Section -->
<table role="presentation" width="100%" border="0" cellpadding="0" cellspacing="0" style="background-color: #eae8e4; border-radius: 12px; margin-bottom: 32px; text-align: center;">
  <tr>
    <td style="padding: 32px;">
      <h2 style="font-size: 24px; font-weight: 700; color: #1b1c1a; margin-bottom: 12px;">Join the Movement</h2>
      <p style="color: #41606e; font-size: 14px; margin-bottom: 24px;">Discover the designers shaping African aesthetics and early access to limited collections.</p>
      <a href="{{ site_url|default:'https://www.urbanaafrica.com' }}" class="btn-primary" style="display: inline-block;">Shop Now</a>
    </td>
  </tr>
</table>
{% endblock %}
